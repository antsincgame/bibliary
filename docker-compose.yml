services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma_data:

# Primary local-dev path — без Docker, через uv:
#   uvx chromadb run --path ./db_data --port 8000
#
# Этот compose-файл — fallback для пользователей с Docker, у которых
# нет uv. Тот же port 8000, persistence через volume `chroma_data`.

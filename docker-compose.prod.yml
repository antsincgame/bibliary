version: "3"

# Production-style stack для self-host (например на Coolify).
# Coolify сам управляет Traefik + SSL → этот compose локальный
# тест полной топологии (backend + Appwrite + MariaDB + Redis).
#
# Quick start:
#   1. cp .env.example .env  и заполни секреты (APPWRITE_*, JWT_PRIVATE_KEY_PEM,
#      BIBLIARY_ENCRYPTION_KEY).
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. open http://localhost/console (Appwrite) — создай project + API key
#   4. Заполни .env актуальными APPWRITE_PROJECT_ID + APPWRITE_API_KEY
#   5. docker compose -f docker-compose.prod.yml restart bibliary
#   6. open http://localhost:3000 — register first user (auto-admin).

x-logging: &x-logging
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "10m"

services:
  # ── Bibliary Hono backend ──────────────────────────────────────
  bibliary:
    build:
      context: .
      dockerfile: Dockerfile
    image: bibliary:local
    container_name: bibliary-backend
    restart: unless-stopped
    networks:
      - bibliary
      - appwrite
    depends_on:
      appwrite:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:-http://appwrite/v1}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID:-bibliary}
      - JWT_PRIVATE_KEY_PEM=${JWT_PRIVATE_KEY_PEM}
      - JWT_PUBLIC_KEY_PEM=${JWT_PUBLIC_KEY_PEM}
      - BIBLIARY_ENCRYPTION_KEY=${BIBLIARY_ENCRYPTION_KEY}
      - BIBLIARY_ADMIN_EMAILS=${BIBLIARY_ADMIN_EMAILS:-}
      - BIBLIARY_DATA_DIR=/data
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    volumes:
      - bibliary-data:/data
    extra_hosts:
      # Позволяет backend контейнеру достать LM Studio на host'е (если он там).
      - "host.docker.internal:host-gateway"
    <<: *x-logging

  # ── Appwrite (Database + Storage + Realtime) ───────────────────
  appwrite:
    image: appwrite/appwrite:1.6
    container_name: bibliary-appwrite
    restart: unless-stopped
    networks:
      - appwrite
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - mariadb
      - redis
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
      - appwrite-functions:/storage/functions:rw
    environment:
      - _APP_ENV=production
      - _APP_LOCALE=en
      - _APP_SYSTEM_EMAIL_ADDRESS=${APPWRITE_EMAIL:-admin@localhost}
      - _APP_DOMAIN=${APPWRITE_DOMAIN:-localhost}
      - _APP_DOMAIN_TARGET=${APPWRITE_DOMAIN:-localhost}
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=user
      - _APP_DB_PASS=${MARIADB_PASSWORD:-password}
      # 5GB cap для крупных PDF / DJVU книг.
      - _APP_STORAGE_LIMIT=5000000000
      - _APP_STORAGE_PREVIEW_LIMIT=20000000
      - _APP_USAGE_STATS=disabled
    <<: *x-logging

  mariadb:
    image: mariadb:11
    container_name: bibliary-mariadb
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=appwrite
      - MYSQL_USER=user
      - MYSQL_PASSWORD=${MARIADB_PASSWORD:-password}
    command: "mariadbd --innodb-flush-method=fsync"
    <<: *x-logging

  redis:
    image: redis:7-alpine
    container_name: bibliary-redis
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-redis:/data:rw
    command: >
      redis-server --maxmemory 512mb
                   --maxmemory-policy allkeys-lru
                   --maxmemory-samples 5
                   --save ""
                   --appendonly no
    <<: *x-logging

networks:
  bibliary:
    name: bibliary
  appwrite:
    name: bibliary-appwrite

volumes:
  bibliary-data:
  appwrite-mariadb:
  appwrite-redis:
  appwrite-uploads:
  appwrite-cache:
  appwrite-config:
  appwrite-certificates:
  appwrite-functions:

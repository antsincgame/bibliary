name: Release · Build

# Запуск:
#   1. Вручную через "Run workflow" в Actions UI
#   2. Автоматически при пуше тега вида v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Имя тега для release (например v1.2.0). Пустое — без публикации release.'
        required: false
        default: ''

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Windows: portable .exe + NSIS installer
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build portable .exe (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile + portable build
        run: npm run electron:build-portable
        env:
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibliary-windows-${{ github.sha }}
          # copy-portable-dist.js кладёт `Bibliary X.Y.Z.exe` в корень проекта
          # (а не в release/dist-portable/) — собираем оттуда + плюс fallback
          # path с release/ на случай если future-builds change structure.
          path: |
            Bibliary*.exe
            release/Bibliary*.exe
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # Публикация GitHub Release (запускается после всех build jobs).
  # publish-release сам по себе runs-on ubuntu-latest — это просто host
  # для скачивания артефактов и публикации, не Linux-сборка.
  # ─────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      # `contents: write` нужен softprops/action-gh-release@v2 чтобы создать
      # Release + загрузить assets через GitHub API. По default GITHUB_TOKEN
      # выдаётся read-only для contents → 403 «Resource not accessible by
      # integration». Вариант: Settings → Actions → General → Workflow
      # permissions = "Read and write" (глобально). Мы делаем job-scoped
      # явный override — безопаснее и переносимо между repo.
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: bibliary-windows-${{ github.sha }}
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/Bibliary*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Запуск раз в неделю — ловим расхождения с upstream (npm packages, Node).
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 UTC
  workflow_dispatch: {}

# Отменяем дублирующиеся runs для одного и того же PR/ветки.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Главный job: на windows-latest, поскольку production билды
  # портативные .exe собираются именно там.
  # ─────────────────────────────────────────────────────────────────
  ci-windows:
    name: Win · Lint · Tests · Compile
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Не скачиваем Electron binary в CI: для lint/test/compile он не нужен.
      # better-sqlite3 имеет prebuilt Windows binary для Node 22.
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      # postinstall пересобирает better-sqlite3 под Electron ABI;
      # для node:test возвращаем под Node ABI через ensure-sqlite-abi.cjs
      # (на чистом CI = rebuild + auto-stash; локально = ~50ms copy).
      - name: Ensure better-sqlite3 ABI (Node)
        run: node scripts/ensure-sqlite-abi.cjs --target=node

      - name: Lint (tsc + eslint)
        run: npm run lint

      - name: Unit tests (Node test runner)
        run: npm run test:fast

      # Sanity-check: полный TypeScript emit без noEmit-кэша.
      - name: Compile Electron TypeScript
        run: npx tsc -p tsconfig.electron.json

      # Electron smoke (Playwright): проверяет что preload bridge,
      # IPC handlers (preferences:get-all + library:* shape) и UI flows
      # реально работают в собранном приложении.
      # Требует именно Windows runner — тесты запускают .exe через Playwright.
      # Не блокирует merge (continue-on-error: true) пока не стабилизируется.
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Electron smoke (real app + preload + IPC)
        continue-on-error: true
        run: npm run test:smoke

      # Артефакты: сохраняем компиляцию + любые отчёты из release/
      - name: Upload compile artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-electron-${{ github.run_id }}
          path: |
            dist-electron/
            release/*.json
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Кросс-платформенная проверка: убедиться, что core-логика
  # (без Electron native) работает на Linux. Дешёвая страховка
  # против Windows-only кода (неэскейпленные пути, regex \\, etc.)
  # ─────────────────────────────────────────────────────────────────
  ci-linux:
    name: Linux · Lint · Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # На Linux нет 7zip / djvulibre wrappers — те тесты, что их требуют,
      # должны помечаться как skip-on-linux. Сейчас почти все unit-тесты
      # самостоятельные и не зависят от platform-binaries.
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Ensure better-sqlite3 ABI (Node)
        run: node scripts/ensure-sqlite-abi.cjs --target=node

      - name: Lint
        run: npm run lint

      # Запускаем только тесты, которые надёжно работают кросс-платформенно.
      # Если какие-то тесты Win-only — добавляй маркер и фильтр.
      # BIBLIARY_SKIP_OCR=1 — на Linux нет system-ocr (см. electron/lib/scanner/ocr/index.ts).
      - name: Unit tests
        env:
          BIBLIARY_SKIP_OCR: '1'
        run: npm run test:fast
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────
  # Отдельный policy-gate: ловит регрессии "thinking-friendly" политики
  # роли → дисциплины. Если кто-то добавил новую crystallizer/evaluator
  # дисциплину без `thinkingFriendly: true` — этот job упадёт быстро
  # (≈3 сек) и без зависимости от sqlite/electron-rebuild.
  # ─────────────────────────────────────────────────────────────────
  olympics-policy:
    name: Olympics · thinking-policy gate
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Olympics policy + scorers + role-load-config + lifecycle + SDK-route tests
        run: node --import tsx --test tests/olympics-thinking-policy.test.ts tests/olympics-scorers.test.ts tests/olympics-weights.test.ts tests/role-load-config.test.ts tests/olympics-load-config-integration.test.ts tests/olympics-lifecycle.test.ts tests/olympics-sdk-route.test.ts

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-linux:
    name: Linux · Lint · Tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install system parser binaries
        # djvulibre / p7zip / tesseract-ocr live on Coolify's runtime image
        # too; install on the CI runner so scanner tests pass with the same
        # binary surface that production sees. Languages match Dockerfile:
        # Cyrillic (rus, ukr), Chinese (chi-sim, chi-tra), English.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            djvulibre-bin p7zip-full \
            tesseract-ocr tesseract-ocr-rus tesseract-ocr-ukr \
            tesseract-ocr-chi-sim tesseract-ocr-chi-tra

      - name: Install dependencies
        run: npm ci

      - name: Lint (tsc server + eslint renderer)
        run: npm run lint

      # Web-stack smoke suite — REQUIRED. Covers the Δ-topology pipeline
      # (chunker, embedder, vectordb concepts/chunks/graph, PPR, server
      # boot, routes, queue, dataset export). 200+ cases, ~5 sec on a
      # warm runner. If THIS goes red the web service is broken.
      - name: Web stack smoke (required)
        env:
          BIBLIARY_SKIP_OCR: '1'
        run: |
          node --import tsx --test \
            tests/server-boot-smoke.test.ts \
            tests/rate-limit-smoke.test.ts \
            tests/library-batch-smoke.test.ts \
            tests/chunker-sections-smoke.test.ts \
            tests/chunker-smoke.test.ts \
            tests/chunker-boundaries.test.ts \
            tests/chunker-streaming-smoke.test.ts \
            tests/chunk-cleanup-smoke.test.ts \
            tests/embedder-helpers-smoke.test.ts \
            tests/vectordb-concepts-smoke.test.ts \
            tests/vectordb-chunks-smoke.test.ts \
            tests/vectordb-graph-smoke.test.ts \
            tests/chunks-l2-parent-smoke.test.ts \
            tests/proposition-build-smoke.test.ts \
            tests/ppr-smoke.test.ts \
            tests/evaluator-provider-smoke.test.ts \
            tests/extractor-provider-smoke.test.ts \
            tests/extraction-queue-state-smoke.test.ts \
            tests/datasets-jsonl-smoke.test.ts \
            tests/datasets-sharegpt-smoke.test.ts \
            tests/datasets-chatml-smoke.test.ts \
            tests/datasets-stream-writer-smoke.test.ts \
            tests/sharegpt-tiered-smoke.test.ts

      # Legacy unit suite — BEST EFFORT. Targets electron/lib/* tests
      # that haven't been retired yet (Phase 13c full migration is still
      # pending; ~120 tests still couple to electron/ paths). Known
      # Linux-specific failures:
      #   - edgeparse-integration: edgeparse-linux-x64-gnu native binary
      #     missing (was patched by fix-edgeparse-native.cjs pre-13b)
      #   - uniqueness-step: mock setup divergence on Linux mtime
      #   - pdf-worker-host: validation predicate divergence on Linux
      # These do NOT block the web service. Phase 13c full migration
      # will retire the affected tests along with electron/lib/.
      - name: Legacy unit suite (best-effort)
        continue-on-error: true
        env:
          BIBLIARY_SKIP_OCR: '1'
        run: npm run test:fast:serial

      - name: Build server + web
        run: npm run build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-windows:
    name: Win · Lint · Tests · Compile
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Ensure better-sqlite3 ABI (Node)
        run: node scripts/ensure-sqlite-abi.cjs --target=node

      - name: Lint (tsc + eslint)
        run: npm run lint

      # Windows runner имеет 4 vCPU → node:test параллелит файлы по CPU cores.
      # Это вызывает подтверждённый flake (~50% ранее): NTFS file
      # locking на временных SQLite/cache-db файлах, которые разные
      # тесты открывают в mkdtempSync()'ах в параллель. macOS нежнее
      # к fs handle reuse и не выдаёт EBUSY/ENOENT под этими же условиями.
      #
      # test:fast:serial пробрасывает --test-concurrency=1 в node:test,
      # чтобы файлы выполнялись sequentially. ~20% медленнее (Win Unit
      # стадия сейчас ~30-50с), но устраняет флейк 100%.
      - name: Unit tests (Node test runner, serial on Windows)
        run: npm run test:fast:serial

      - name: Compile Electron TypeScript
        run: npx tsc -p tsconfig.electron.json

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Electron smoke (real app + preload + IPC)
        continue-on-error: true
        run: npm run test:smoke

      - name: Upload compile artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-electron-${{ github.run_id }}
          path: |
            dist-electron/
            release/*.json
          retention-days: 7
          if-no-files-found: ignore

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-windows:
    name: Win · Lint · Tests · Compile
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Ensure better-sqlite3 ABI (Node)
        run: node scripts/ensure-sqlite-abi.cjs --target=node

      - name: Lint (tsc + eslint)
        run: npm run lint

      # ВРЕМЕННО (диагностика 2026-05-10 round 2): hang устранён, но какой-то
      # тест всё ещё падает после atomic-fix 1a54cab. Чтобы локализовать,
      # снова запускаем diagnose-test-hang.cjs — он покажет PASS/FAIL/TIMEOUT
      # таблицу в логах. После идентификации → revert.
      - name: Unit tests — DIAGNOSTIC MODE round 2
        timeout-minutes: 30
        run: node scripts/diagnose-test-hang.cjs

      - name: Compile Electron TypeScript
        run: npx tsc -p tsconfig.electron.json

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Electron smoke (real app + preload + IPC)
        continue-on-error: true
        run: npm run test:smoke

      - name: Upload compile artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-electron-${{ github.run_id }}
          path: |
            dist-electron/
            release/*.json
          retention-days: 7
          if-no-files-found: ignore

  ci-macos:
    name: macOS · Lint · Tests · Compile
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Ensure better-sqlite3 ABI (Node)
        run: node scripts/ensure-sqlite-abi.cjs --target=node

      - name: Lint (tsc + eslint)
        run: npm run lint

      - name: Unit tests — DIAGNOSTIC MODE round 2
        timeout-minutes: 30
        run: node scripts/diagnose-test-hang.cjs
        env:
          BIBLIARY_SKIP_OCR: '1'

      - name: Compile Electron TypeScript
        run: npx tsc -p tsconfig.electron.json

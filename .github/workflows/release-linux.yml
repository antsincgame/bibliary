name: Release · Linux Build

# Запуск:
#   1. Вручную через "Run workflow" в Actions UI
#   2. Автоматически при пуше тега вида v0.4.4
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Имя тега для release (например v0.4.4). Пустое — без публикации.'
        required: false
        default: ''

jobs:
  build-linux:
    name: Build AppImage + .deb (Linux x64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # Полная история нужна для генерации changelog по тегам.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # DjVuLibre system-package для Linux — один из вариантов получить
      # бинари. Альтернатива: скачать через scripts/download-djvulibre-linux.cjs,
      # который в свою очередь использует apt-get или системный install.
      - name: Install djvulibre system package
        run: |
          sudo apt-get update
          sudo apt-get install -y djvulibre-bin

      - name: Bundle djvulibre to vendor/djvulibre/linux-x64
        run: node scripts/download-djvulibre-linux.cjs

      - name: Install dependencies
        run: npm ci

      # better-sqlite3 нужно собрать под Electron ABI (NODE_MODULE_VERSION 145).
      # ensure-sqlite-abi.cjs делает rebuild и stash, afterPack.js подхватывает.
      - name: Ensure better-sqlite3 ABI (Electron)
        run: node scripts/ensure-sqlite-abi.cjs --target=electron

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Build Linux AppImage + deb
        run: npx electron-builder --linux AppImage deb tar.gz
        env:
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bibliary-linux-${{ github.sha }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
          retention-days: 30

      # Если запущено по тегу — публикуем GitHub Release
      - name: Create GitHub Release (Linux artifacts)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Smoke · Quick Sanity

# Дешёвый, очень быстрый workflow: только запускается на PR-changes
# в ключевых директориях. Если он падает — большой CI можно даже не ждать.
on:
  pull_request:
    paths:
      - 'electron/**'
      - 'renderer/**'
      - 'tests/**'
      - 'package.json'
      - 'tsconfig*.json'

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Quick: lint + dirty-world tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: TypeScript check
        run: npm run typecheck

      # Самые критичные тесты: грязные файлы + классификация + fallback.
      # Если хотя бы они падают — PR не должен мержиться.
      - name: Critical tests (dirty-world + classifier + fallback + delta + olympics policy + scorers)
        run: |
          node --import tsx --test \
            tests/ingest-dirty-world.test.ts \
            tests/olympics-weights.test.ts \
            tests/olympics-thinking-policy.test.ts \
            tests/olympics-scorers.test.ts \
            tests/librarian.test.ts \
            tests/folder-bundle.test.ts \
            tests/magic-bytes.test.ts \
            tests/with-model-fallback.test.ts \
            tests/delta-extractor-prompt.test.ts \
            tests/lang-detector.test.ts \
            tests/parsers-html-edge.test.ts

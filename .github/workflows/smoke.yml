name: Smoke · Quick Sanity

# Дешёвый, очень быстрый workflow: только запускается на PR-changes
# в ключевых директориях. Если он падает — большой CI можно даже не ждать.
on:
  pull_request:
    paths:
      - 'electron/**'
      - 'renderer/**'
      - 'tests/**'
      - 'package.json'
      - 'tsconfig*.json'

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: "Quick: lint + dirty-world tests"
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      # better-sqlite3 нужен под Node ABI для node:test. ensure-sqlite-abi.cjs
      # пытается взять stash, fallback → npm rebuild (на чистом CI всегда rebuild).
      - name: Ensure better-sqlite3 ABI (Node)
        run: node scripts/ensure-sqlite-abi.cjs --target=node

      - name: TypeScript check
        run: npm run typecheck

      # Самые критичные тесты: грязные файлы + классификация + delta + парсинг.
      # Если хотя бы они падают — PR не должен мержиться.
      # NB: olympics/role-load-config/with-model-fallback/illustration-semaphore
      # удалены вместе с refactor 9 ролей → 3 задач (2026-05).
      - name: Critical tests (dirty-world + classifier + delta + parsers)
        env:
          BIBLIARY_SKIP_OCR: '1'
        run: |
          node --import tsx --test \
            tests/ingest-dirty-world.test.ts \
            tests/folder-bundle.test.ts \
            tests/magic-bytes.test.ts \
            tests/delta-extractor-prompt.test.ts \
            tests/lang-detector.test.ts \
            tests/parsers-html-edge.test.ts

      # Дополнительные node:test suites: ModelPool + Chroma + cache-db + auto-config + uniqueness.
      - name: Extra unit suites (model-pool + chroma + cache-db + auto-config + uniqueness)
        run: |
          node --import tsx --test \
            tests/model-pool.test.ts \
            tests/chroma-collection-config.test.ts \
            tests/chroma-collection-cache.test.ts \
            tests/chroma-query-distance-conversion.test.ts \
            tests/cache-db-roundtrip.test.ts \
            tests/cache-db-migration-v8.test.ts \
            tests/auto-config-tasks.test.ts \
            tests/uniqueness-extract-ideas.test.ts \
            tests/uniqueness-dedup-within-book.test.ts \
            tests/uniqueness-judge-llm.test.ts \
            tests/uniqueness-score-pipeline.test.ts

      # Полный test suite кроме env-зависимых (vision-meta требует LM Studio).
      # Best-effort: не блокирует merge.
      - name: Full unit suite (best-effort)
        continue-on-error: true
        env:
          BIBLIARY_SKIP_OCR: '1'
        run: |
          files=$(ls tests/*.test.ts | grep -vE '(vision-meta)\.test\.ts')
          node --import tsx --test $files

name: Smoke · Quick Sanity

# Дешёвый, очень быстрый workflow: только запускается на PR-changes
# в ключевых директориях. Если он падает — большой CI можно даже не ждать.
on:
  pull_request:
    paths:
      - 'electron/**'
      - 'renderer/**'
      - 'tests/**'
      - 'package.json'
      - 'tsconfig*.json'

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: "Quick: lint + dirty-world tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      # better-sqlite3 нужен под Node ABI для node:test. ensure-sqlite-abi.cjs
      # пытается взять stash, fallback → npm rebuild (на чистом CI всегда rebuild).
      - name: Ensure better-sqlite3 ABI (Node)
        run: node scripts/ensure-sqlite-abi.cjs --target=node

      - name: TypeScript check
        run: npm run typecheck

      # Самые критичные тесты: грязные файлы + классификация + fallback.
      # Если хотя бы они падают — PR не должен мержиться.
      - name: Critical tests (dirty-world + classifier + fallback + delta + olympics + role-tuning + sdk-route)
        env:
          BIBLIARY_SKIP_OCR: '1'
        run: |
          node --import tsx --test \
            tests/ingest-dirty-world.test.ts \
            tests/olympics-weights.test.ts \
            tests/olympics-thinking-policy.test.ts \
            tests/olympics-scorers.test.ts \
            tests/olympics-lifecycle.test.ts \
            tests/olympics-sdk-route.test.ts \
            tests/role-load-config.test.ts \
            tests/olympics-load-config-integration.test.ts \
            tests/folder-bundle.test.ts \
            tests/magic-bytes.test.ts \
            tests/with-model-fallback.test.ts \
            tests/delta-extractor-prompt.test.ts \
            tests/lang-detector.test.ts \
            tests/parsers-html-edge.test.ts

      # Дополнительные node:test suites (ModelPool, qdrant config, illustration semaphore).
      - name: Extra unit suites (model-pool + qdrant-collection-config + illustration-semaphore)
        run: |
          node --import tsx --test \
            tests/model-pool.test.ts \
            tests/qdrant-collection-config.test.ts \
            tests/illustration-semaphore.test.ts

      # Полный test suite кроме env-зависимых (vision-meta требует LM Studio).
      # Best-effort на Linux: помечаем какие тесты падают на ubuntu-latest, чтобы
      # затем починить или явно skip-on-linux. Не блокирует merge.
      - name: Full unit suite (best-effort, Linux baseline)
        continue-on-error: true
        env:
          BIBLIARY_SKIP_OCR: '1'
        run: |
          files=$(ls tests/*.test.ts | grep -vE '(vision-meta)\.test\.ts')
          node --import tsx --test $files

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com">
  <title>Bibliary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar">
      <button class="sidebar-icon active" data-route="chat" data-i18n-attr="title:nav.chat.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h16v11H8l-4 4z"/></svg>
        <span data-i18n="nav.chat">Чат</span>
      </button>
      <button class="sidebar-icon" data-route="library" data-i18n-attr="title:nav.library.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h4v16H4zM10 4h4v16h-4zM16 6l4 1-3 14-4-1z"/></svg>
        <span data-i18n="nav.library">Библиотека</span>
      </button>
      <button class="sidebar-icon" data-route="qdrant" data-i18n-attr="title:nav.qdrant.title" data-mode-min="advanced">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
        <span data-i18n="nav.qdrant">База знаний</span>
      </button>
      <button class="sidebar-icon" data-route="agent" data-i18n-attr="title:nav.agent.title" data-mode-min="pro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="3"/><path d="M5 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/><path d="M12 11v3M9 14l3-3 3 3"/></svg>
        <span data-i18n="nav.agent">Помощник</span>
      </button>
      <button class="sidebar-icon" data-route="crystal" data-i18n-attr="title:nav.crystal.title" data-mode-min="pro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2 4 9l8 13 8-13z"/><path d="M4 9h16M12 2v20M9 9l3 13M15 9l-3 13"/></svg>
        <span data-i18n="nav.crystal">Извлечение знаний</span>
      </button>
      <button class="sidebar-icon" data-route="models" data-i18n-attr="title:nav.models.title" data-mode-min="advanced">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 7l2-2"/></svg>
        <span data-i18n="nav.models">Модели</span>
      </button>
      <button class="sidebar-icon" data-route="forge" data-i18n-attr="title:nav.forge.title" data-mode-min="advanced">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 18h18l-2-7H5z"/><path d="M9 11V7l3-3 3 3v4"/></svg>
        <span data-i18n="nav.forge">Дообучение</span>
      </button>
      <button class="sidebar-icon" data-route="docs" data-i18n-attr="title:nav.docs.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 4h11l3 3v13H5z"/><path d="M16 4v3h3"/><path d="M8 12h8M8 16h8M8 8h4"/></svg>
        <span data-i18n="nav.docs">Книга</span>
      </button>
      <button class="sidebar-icon" data-route="settings" data-i18n-attr="title:nav.settings.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="nav.settings">Настройки</span>
      </button>
      <div class="sidebar-spacer"></div>
      <button class="sidebar-mode" id="btn-ui-mode" data-i18n-attr="title:mode.toggle.title" type="button">
        <span class="mode-current" id="mode-current-label">SIM</span>
      </button>
      <button class="sidebar-lang" id="btn-lang" data-i18n-attr="title:lang.toggle.title" type="button">
        <span class="lang-current">RU</span>
      </button>
    </nav>

    <main class="workspace">
      <section id="route-chat" class="route route-active">
        <div class="top-bar">
          <div class="app-title">Bibliary</div>
          <div class="control-group">
            <span class="control-label" data-i18n="chat.controls.collection">Коллекция</span>
            <select id="collection-select"><option value="" data-i18n="chat.loading">загрузка...</option></select>
            <button class="btn-refresh" id="btn-refresh-collections" data-i18n-attr="title:chat.controls.refresh">↻</button>
            <button class="btn-refresh btn-create" id="btn-create-collection" data-i18n-attr="title:chat.controls.collection.create">+</button>
          </div>
          <div class="control-group">
            <span class="control-label" data-i18n="chat.controls.model">Модель</span>
            <select id="model-select"><option value="" data-i18n="chat.loading">загрузка...</option></select>
            <button class="btn-refresh" id="btn-refresh-models" data-i18n-attr="title:chat.controls.refresh">↻</button>
          </div>
          <button class="btn-memory" id="btn-memory" type="button" data-i18n-attr="title:ctx.title">
            <span class="btn-memory-icon" aria-hidden="true">∞</span>
            <span class="btn-memory-label" id="btn-memory-label" data-i18n="ctx.btn.default">Память</span>
            <span class="btn-memory-caret" aria-hidden="true">▾</span>
          </button>
          <button class="btn-compare" id="btn-compare" data-i18n="chat.controls.compare" data-i18n-attr="title:chat.controls.compare.title">Сравнить</button>
          <div class="status-dot" id="status-dot" data-i18n-attr="title:chat.status.offline"></div>
        </div>
        <div id="memory-popover" class="memory-popover" hidden></div>
        <div class="chat-area" id="chat-area">
          <div class="welcome">
            <div class="welcome-title">Bibliary</div>
            <div class="welcome-sub" data-i18n="chat.welcome.sub">база знаний // 2666 год</div>
          </div>
        </div>
        <div class="input-bar">
          <div class="input-wrapper">
            <textarea id="input" rows="1" data-i18n-attr="placeholder:chat.input.placeholder"></textarea>
          </div>
          <button class="btn-send" id="btn-send" data-i18n="chat.send">Отправить</button>
        </div>
      </section>

      <section id="route-library" class="route">
        <div class="route-header">
          <div class="route-title" data-i18n="library.header.title">Библиотека книг</div>
          <div class="route-sub" data-i18n="library.header.sub">Сканирует PDF · EPUB · FB2 · DOCX · TXT — превращает книги в концепты Qdrant</div>
        </div>
        <div id="library-root" class="route-body"></div>
      </section>

      <section id="route-agent" class="route">
        <div id="agent-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-crystal" class="route">
        <div id="crystal-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-models" class="route">
        <div id="models-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-forge" class="route">
        <div id="forge-root" class="route-body route-body-no-header"></div>
      </section>
      <section id="route-qdrant" class="route">
        <div id="qdrant-root" class="route-body route-body-no-header"></div>
      </section>
      <section id="route-docs" class="route">
        <div id="docs-root" class="route-body"></div>
      </section>
      <section id="route-settings" class="route">
        <div id="settings-root" class="route-body route-body-no-header"></div>
      </section>
    </main>
  </div>

  <script src="marked.umd.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script type="module" src="router.js"></script>
</body>
</html>

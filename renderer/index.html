<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: bibliary-asset:">
  <title>Bibliary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar">
      <button class="sidebar-icon active" data-route="models" data-i18n-attr="title:nav.models.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 7l2-2"/></svg>
        <span data-i18n="nav.models">Модели</span>
      </button>
      <button class="sidebar-icon" data-route="library" data-i18n-attr="title:nav.library.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h4v16H4zM10 4h4v16h-4zM16 6l4 1-3 14-4-1z"/></svg>
        <span data-i18n="nav.library">Библиотека</span>
      </button>
      <button class="sidebar-icon" data-route="crystal" data-i18n-attr="title:nav.crystal.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2 4 9l8 13 8-13z"/><path d="M4 9h16M12 2v20M9 9l3 13M15 9l-3 13"/></svg>
        <span data-i18n="nav.crystal">Создание датасета</span>
      </button>
      <button class="sidebar-icon" data-route="datasets" data-i18n-attr="title:nav.datasets.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 5h18v4H3zM3 11h18v4H3zM3 17h18v4H3z"/><path d="M7 7h.01M7 13h.01M7 19h.01"/></svg>
        <span data-i18n="nav.datasets">Датасеты</span>
      </button>
      <button class="sidebar-icon" data-route="arena" data-i18n-attr="title:nav.arena.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 21h8M12 17v4M6.5 3h11l-2 8H8.5L6.5 3z"/><path d="M5 3h14"/><circle cx="12" cy="14" r="3"/></svg>
        <span data-i18n="nav.arena">Арена</span>
      </button>
      <button class="sidebar-icon" data-route="docs" data-i18n-attr="title:nav.docs.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 4h11l3 3v13H5z"/><path d="M16 4v3h3"/><path d="M8 12h8M8 16h8M8 8h4"/></svg>
        <span data-i18n="nav.docs">Помощь</span>
      </button>
      <button class="sidebar-icon" data-route="settings" data-i18n-attr="title:nav.settings.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="nav.settings">Настройки</span>
      </button>
      <div class="sidebar-spacer"></div>
      <button class="sidebar-lang" id="btn-lang" data-i18n-attr="title:lang.toggle.title" type="button">
        <span class="lang-current">RU</span>
      </button>
    </nav>

    <main class="workspace">
      <section id="route-models" class="route route-active">
        <div id="models-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-library" class="route">
        <div id="library-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-crystal" class="route">
        <div id="crystal-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-datasets" class="route">
        <div id="datasets-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-arena" class="route">
        <div id="arena-root" class="route-body route-body-no-header"></div>
      </section>

      <section id="route-docs" class="route">
        <div id="docs-root" class="route-body"></div>
      </section>

      <section id="route-settings" class="route">
        <div id="settings-root" class="route-body route-body-no-header"></div>
      </section>
    </main>
  </div>

  <script src="marked.umd.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script type="module" src="router.js"></script>
</body>
</html>

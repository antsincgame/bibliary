appId: com.bibliary.app
productName: Bibliary
# Output: по умолчанию `release/` рядом с проектом.
# Для OneDrive-папок переопределяйте через CLI:
#   electron-builder --win portable --config.directories.output=C:\Temp\bibliary-build
# (cloud-sync блокирует app.asar 266 МБ при повторной сборке).
directories:
  output: release
files:
  - dist-electron/**/*
  - renderer/**/*
  - node_modules/**/*
  - package.json
extraResources:
  # Vendor binaries — per-platform (win32-x64, darwin-arm64, darwin-x64).
  # electron-builder replaces ${platform}/${arch} at build time.
  - from: vendor/djvulibre/${platform}-${arch}
    to: vendor/djvulibre/${platform}-${arch}
    filter:
      - "**/*"
  - from: vendor/7zip/${platform}-${arch}
    to: vendor/7zip/${platform}-${arch}
    filter:
      - "**/*"
  # Iter 14.4 (2026-05-04): pure-JS DjVu parser (RussCoder/djvu.js, GPL v2).
  # Cross-platform IIFE bundle 544 KB — primary path в djvu-cli.ts; vendor
  # DjVuLibre binaries остаются как graceful fallback (через 1-2 итерации
  # удалим если native показывает себя стабильным на проде).
  - from: vendor/djvu
    to: vendor/djvu
    filter:
      - "**/*"
win:
  target:
    - nsis
    - portable
  forceCodeSigning: false
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  # Hardened Runtime required for notarization.
  # Sign with: APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID env vars.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
dmg:
  title: "Bibliary ${version}"
  window:
    width: 540
    height: 380
asar: true
asarUnpack:
  # Native addons and binary runtimes must be outside asar (no dlopen inside archive).
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"
  - "node_modules/better-sqlite3/**/*.node"
  - "node_modules/7z-bin/**/*"
  - "node_modules/7zip-bin/**/*"
  - "node_modules/@firecrawl/pdf-inspector/**/*"
  # edgeparse — Windows
  - "node_modules/edgeparse/dist/**/*"
  - "node_modules/edgeparse/npm/edgeparse-node.win32-x64-msvc.node"
  - "node_modules/edgeparse/npm/win32-x64-msvc/**/*"
  - "node_modules/edgeparse/package.json"
  - "node_modules/edgeparse-win32-x64-msvc/**/*"
  # edgeparse — macOS arm64 / x64
  - "node_modules/edgeparse/npm/edgeparse-node.darwin-arm64.node"
  - "node_modules/edgeparse/npm/darwin-arm64/**/*"
  - "node_modules/edgeparse-darwin-arm64/**/*"
  - "node_modules/edgeparse/npm/edgeparse-node.darwin-x64.node"
  - "node_modules/edgeparse/npm/darwin-x64/**/*"
  - "node_modules/edgeparse-darwin-x64/**/*"
  # System OCR — Windows + macOS Vision Framework bindings
  - "node_modules/@napi-rs/system-ocr/**/*"
  # Canvas (PDF rasterisation) — native per-platform
  - "node_modules/@napi-rs/canvas/**/*"
extraMetadata:
  type: commonjs
afterPack: scripts/afterPack.js

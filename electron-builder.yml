appId: com.bibliary.app
productName: Bibliary
# Output: по умолчанию `release/` рядом с проектом.
# Для OneDrive-папок переопределяйте через CLI:
#   electron-builder --win portable --config.directories.output=C:\Temp\bibliary-build
# (cloud-sync блокирует app.asar 266 МБ при повторной сборке).
directories:
  output: release
files:
  - dist-electron/**/*
  - renderer/**/*
  - node_modules/**/*
  - package.json
extraResources:
  # Vendor binaries — Windows only (win32-x64).
  - from: vendor/djvulibre/${platform}-${arch}
    to: vendor/djvulibre/${platform}-${arch}
    filter:
      - "**/*"
  - from: vendor/7zip/${platform}-${arch}
    to: vendor/7zip/${platform}-${arch}
    filter:
      - "**/*"
  # Iter 14.4 (2026-05-04): pure-JS DjVu parser (RussCoder/djvu.js, GPL v2).
  # Cross-platform IIFE bundle 544 KB — primary path в djvu-cli.ts; vendor
  # DjVuLibre binaries остаются как graceful fallback (через 1-2 итерации
  # удалим если native показывает себя стабильным на проде).
  - from: vendor/djvu
    to: vendor/djvu
    filter:
      - "**/*"
  # Tesseract.js tessdata (rus/ukr/eng) — Tier-1a OCR для DjVu/PDF без
  # text-layer'а. ~12 MB total, downloaded локально (no CDN runtime fetch).
  # Закрывает Linux-gap (нет system OCR) и вытесняет vision-LLM (плохо знает
  # кириллицу) в Tier-2. См. electron/lib/scanner/ocr/tesseract.ts.
  - from: vendor/tessdata
    to: vendor/tessdata
    filter:
      - "**/*"
win:
  target:
    - nsis
    - portable
  forceCodeSigning: false
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
asar: true
asarUnpack:
  # Native addons and binary runtimes must be outside asar (no dlopen inside archive).
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"
  - "node_modules/better-sqlite3/**/*.node"
  - "node_modules/7z-bin/**/*"
  - "node_modules/7zip-bin/**/*"
  - "node_modules/@firecrawl/pdf-inspector/**/*"
  # edgeparse — Windows
  - "node_modules/edgeparse/dist/**/*"
  - "node_modules/edgeparse/npm/edgeparse-node.win32-x64-msvc.node"
  - "node_modules/edgeparse/npm/win32-x64-msvc/**/*"
  - "node_modules/edgeparse/package.json"
  - "node_modules/edgeparse-win32-x64-msvc/**/*"
  # System OCR — Windows
  - "node_modules/@napi-rs/system-ocr/**/*"
  # Canvas (PDF rasterisation) — native per-platform
  - "node_modules/@napi-rs/canvas/**/*"
  # LanceDB — Rust native binary (NAPI prebuilt per platform).
  # Без unpack процесс не сможет dlopen() .node файл из asar архива.
  - "node_modules/@lancedb/**/*"
  # apache-arrow — pure JS, но lancedb зависит от него; safest to keep adjacent.
  - "node_modules/apache-arrow/**/*"
  # Tesseract.js — pure JS + WASM core. Worker spawn использует worker_threads,
  # которые требуют чтобы tesseract.js + tesseract.js-core были unpacked
  # (asar archive не позволяет dlopen WASM напрямую).
  - "node_modules/tesseract.js/**/*"
  - "node_modules/tesseract.js-core/**/*"
extraMetadata:
  type: commonjs
afterPack: scripts/afterPack.js

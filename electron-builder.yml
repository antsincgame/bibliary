appId: com.bibliary.app
productName: Bibliary
# Output: по умолчанию `release/` рядом с проектом.
# Для OneDrive-папок переопределяйте через CLI:
#   electron-builder --win portable --config.directories.output=C:\Temp\bibliary-build
# (cloud-sync блокирует app.asar 266 МБ при повторной сборке).
directories:
  output: release
files:
  - dist-electron/**/*
  - renderer/**/*
  - node_modules/**/*
  - package.json
extraResources:
  # Per-platform vendor binaries (Phase 4.4 cross-platform roadmap, 2026-04-30).
  # `${platform}-${arch}` подставляется electron-builder во время упаковки:
  #   Win build      → win32-x64
  #   Linux x64 build → linux-x64
  - from: vendor/djvulibre/${platform}-${arch}
    to: vendor/djvulibre/${platform}-${arch}
    filter:
      - "**/*"
  - from: vendor/7zip/${platform}-${arch}
    to: vendor/7zip/${platform}-${arch}
    filter:
      - "**/*"
  # Iter 14.4 (2026-05-04): pure-JS DjVu parser (RussCoder/djvu.js, GPL v2).
  # Cross-platform IIFE bundle 544 KB — primary path в djvu-cli.ts; vendor
  # DjVuLibre binaries остаются как graceful fallback (через 1-2 итерации
  # удалим если native показывает себя стабильным на проде).
  - from: vendor/djvu
    to: vendor/djvu
    filter:
      - "**/*"
win:
  target:
    - nsis
    - portable
  forceCodeSigning: false
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
linux:
  # AppImage = portable single-file (запуск без install)
  # deb = установка через apt в /usr/lib/bibliary
  # tar.gz = ручная распаковка для нестандартных дистро
  target:
    - AppImage
    - deb
    - tar.gz
  category: Office
  synopsis: Personal knowledge base from books
  description: Bibliary turns a book collection into a vector knowledge base via local LLMs (LM Studio) and Qdrant.
  maintainer: Bibliary contributors
  # icon: build/icon.png  # uncomment when build/icon.png is added
asar: true
asarUnpack:
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"
  - "node_modules/better-sqlite3/**/*.node"
  - "node_modules/7z-bin/**/*"
  - "node_modules/7zip-bin/**/*"
  - "node_modules/@firecrawl/pdf-inspector/**/*"
  - "node_modules/edgeparse/dist/**/*"
  # Per-platform edgeparse native bindings. electron-builder сам выбирает
  # нужные при сборке — Win берёт win32-x64-msvc, Linux linux-x64-gnu и т.д.
  - "node_modules/edgeparse/npm/edgeparse-node.win32-x64-msvc.node"
  - "node_modules/edgeparse/npm/edgeparse-node.linux-x64-gnu.node"
  - "node_modules/edgeparse/npm/edgeparse-node.linux-arm64-gnu.node"
  - "node_modules/edgeparse/npm/win32-x64-msvc/**/*"
  - "node_modules/edgeparse/package.json"
  - "node_modules/edgeparse-win32-x64-msvc/**/*"
  - "node_modules/edgeparse-linux-x64-gnu/**/*"
  - "node_modules/edgeparse-linux-arm64-gnu/**/*"
  - "node_modules/@napi-rs/system-ocr/**/*"
extraMetadata:
  type: commonjs
afterPack: scripts/afterPack.js

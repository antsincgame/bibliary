version: "3"

# Local-development Appwrite stack. Mirrors the topology Coolify spins up
# in production, but trimmed to the services we use. Bring it up with:
#   docker compose -f docker-compose.dev.yml up -d
# Then visit http://localhost/console to bootstrap a project, copy the
# project id + API key into .env, and run `npm run appwrite:bootstrap`.

x-logging: &x-logging
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "10m"

services:
  appwrite:
    image: appwrite/appwrite:1.6
    container_name: bibliary-appwrite
    restart: unless-stopped
    networks:
      - appwrite
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - mariadb
      - redis
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
      - appwrite-functions:/storage/functions:rw
    environment:
      - _APP_ENV=development
      - _APP_LOCALE=en
      - _APP_SYSTEM_EMAIL_ADDRESS=admin@localhost
      - _APP_DOMAIN=localhost
      - _APP_DOMAIN_TARGET=localhost
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=user
      - _APP_DB_PASS=password
      - _APP_STORAGE_LIMIT=5000000000
      - _APP_STORAGE_PREVIEW_LIMIT=20000000
      - _APP_USAGE_STATS=disabled
    <<: *x-logging

  mariadb:
    image: mariadb:11
    container_name: bibliary-mariadb
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=rootsecretpassword
      - MYSQL_DATABASE=appwrite
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    command: "mariadbd --innodb-flush-method=fsync"
    <<: *x-logging

  redis:
    image: redis:7-alpine
    container_name: bibliary-redis
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-redis:/data:rw
    command: >
      redis-server --maxmemory 512mb
                   --maxmemory-policy allkeys-lru
                   --maxmemory-samples 5
                   --save ""
                   --appendonly no
    <<: *x-logging

networks:
  appwrite:
    name: bibliary-appwrite

volumes:
  appwrite-mariadb:
  appwrite-redis:
  appwrite-uploads:
  appwrite-cache:
  appwrite-config:
  appwrite-certificates:
  appwrite-functions:
